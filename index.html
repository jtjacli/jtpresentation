    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; background-color: #f8fafc; margin: 0; }
        
        .timeline-line {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, #e2e8f0 0%, #3b82f6 100%);
            z-index: 0;
            transform: translateY(-50%);
            transform-origin: left;
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .animate-item {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .animate-item.active {
            opacity: 1;
            transform: translateY(0);
        }

        .loading-shimmer {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        @media (max-width: 1024px) {
            .timeline-line { display: none; }
        }
        
        /* Ensure content doesn't get cut in Canva iframe */
        #slide-container {
            min-height: auto;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-8">

    <!-- Main Slide Container -->
    <div id="slide-container" class="bg-white w-full max-w-6xl rounded-2xl shadow-2xl overflow-hidden flex flex-col relative border border-slate-200 transition-all duration-700">
        
        <!-- Header -->

                    40 Years of Evolution: From Local Origin <br class="hidden md:block"> to <span class="text-blue-600 underline decoration-blue-200">Global Tech Solutions</span>
                </h1>
            </div>
            
            <div class="flex gap-3 shrink-0">

                    <i class="fas fa-play text-blue-600"></i> <span>Replay</span>
                </button>

                    <span>✨ AI Assistant</span>
                </button>
            </div>
        </div>

        <!-- Timeline -->
        <div class="flex-grow px-8 py-10 relative">
